components:
  schemas:
    CommentDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        content:
          type: string
        createdAt:
          type: string
        likesCount:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        userNickname:
          type: string
    PostDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        content:
          type: string
        createdAt:
          type: string
        likesCount:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        userNickname:
          type: string
        categoryId:
          type: integer
          format: int64
        categoryName:
          type: string
        comments:
          type: array
          items:
            $ref: '#/components/schemas/CommentDTO'
    CategoryDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
    UserDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        surname:
          type: string
        nickname:
          type: string
        description:
          type: string
        email:
          type: string
        active:
          type: boolean
        roles:
          type: array
          items:
            type: string
    RegisterDTO:
      type: object
      properties:
        name:
          type: string
        surname:
          type: string
        nickname:
          type: string
        email:
          type: string
        description:
          type: string
        password:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    AuthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - SUCCESS
            - FAILURE
        message:
          type: string
        error:
          type: string
    UserStatusDTO:
      type: object
      properties:
        active:
          type: boolean
    PagePostDTO:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        sort:
          $ref: '#/components/schemas/SortObject'
        pageable:
          $ref: '#/components/schemas/PageableObject'
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: '#/components/schemas/PostDTO'
        number:
          type: integer
          format: int32
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        sort:
          $ref: '#/components/schemas/SortObject'
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        paged:
          type: boolean
        unpaged:
          type: boolean
        offset:
          type: integer
          format: int64
    SortObject:
      type: object
      properties:
        sorted:
          type: boolean
        unsorted:
          type: boolean
        empty:
          type: boolean
    CategoryExtendedDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        imageUrl:
          type: string
        posts:
          type: array
          items:
            $ref: '#/components/schemas/PostDTO'
